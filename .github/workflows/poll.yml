name: Poll Deribit Options Data

on:
  schedule:
    # Her 15 dakikada bir calisir. GitHub'in cron kuyrugu yogunlukta birkac
    # dakika geciktirebilir, bu normaldir.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Deribit data
        run: python poll_deribit.py

      - name: Commit and push if data changed
        run: |
          git config user.name "deribit-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/latest.json data/history.csv
          if git diff --cached --quiet; then
            echo "Degisiklik yok, commit atlanıyor."
          else
            git commit -m "data: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
